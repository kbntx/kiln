root = "/app/backend"
tmp_dir = "/tmp/air"

[build]
  cmd = "go build -o /tmp/air/kiln ./cmd/kiln"
  bin = "/tmp/air/kiln"
  delay = 1000
  include_ext = ["go", "mod", "sum"]
  exclude_dir = ["testdata", "static"]
  exclude_regex = ["_test\\.go$"]
  kill_delay = "1s"

[log]
  time = false

[misc]
  clean_on_exit = true
