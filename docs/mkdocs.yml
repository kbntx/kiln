site_name: Kiln
repo_name: kbntx/kiln
repo_url: https://github.com/kbntx/kiln

docs_dir: content

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.footer
    - navigation.top
    - navigation.instant
    - content.code.copy

  palette:
    - scheme: slate
      primary: black
      accent: indigo

plugins:
  - search
  - awesome-nav
  - glightbox

watch:
  - content
  - mkdocs.yml
